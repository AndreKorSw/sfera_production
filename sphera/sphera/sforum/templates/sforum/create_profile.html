{% extends "sforum/base.html" %}



{% block content %}
<main class="main">
	<div class="container">
        <div class="container5">
          <form class="form-container" action="{% url 'create_profile' %}" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div>{{ form.non_field_errors }}</div>
            <h2 class="form-title">Создать профиль</h2>
            {% for f in form %}
              <div class="form-group">
                <label for="{{ f.id_for_label }}">{{ f.label }}</label>
                <div>{{ f }}</div>
                <div>{{ f.errors }}</div>
              </div>
            {% endfor %}

            <button class="form-button" type="submit">Создать</button>
          </form>
        </div>    </div>
</main>
{% endblock %}
